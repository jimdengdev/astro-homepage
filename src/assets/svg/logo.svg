<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 64" fill="none" role="img" aria-label="JimDeng">
  <defs>
    <!-- 主体：金色红渐变（顶金 → 中红 → 底深红） -->
    <linearGradient id="goldRed" x1="0" y1="6" x2="0" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD580"/>
      <stop offset="0.25" stop-color="#FFA84A"/>
      <stop offset="0.55" stop-color="#E63950"/>
      <stop offset="1" stop-color="#7A0E20"/>
    </linearGradient>

    <!-- 顶部金色高光 -->
    <linearGradient id="goldShine" x1="0" y1="10" x2="0" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF6D8" stop-opacity="0.85"/>
      <stop offset="0.55" stop-color="#FFE6A6" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- 暖深红投影 -->
    <filter id="warmShadow" x="-10%" y="-10%" width="120%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feFlood flood-color="#3A0008" flood-opacity="0.6"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- JimDeng 艺术曲线文字（金色红） -->
  <g filter="url(#warmShadow)">
    <!-- 底层：金红渐变 + 暖红描边 -->
    <text
      x="4"
      y="48"
      font-family="'Pacifico','Dancing Script','Caveat','Brush Script MT','Snell Roundhand','Lucida Handwriting',cursive"
      font-size="44"
      font-weight="500"
      font-style="italic"
      fill="url(#goldRed)"
      stroke="#5A0E1A"
      stroke-width="0.5"
      letter-spacing="0"
    >JimDeng</text>

    <!-- 顶层：金色高光 -->
    <text
      x="4"
      y="48"
      font-family="'Pacifico','Dancing Script','Caveat','Brush Script MT','Snell Roundhand','Lucida Handwriting',cursive"
      font-size="44"
      font-weight="500"
      font-style="italic"
      fill="url(#goldShine)"
      letter-spacing="0"
    >JimDeng</text>
  </g>
</svg>
